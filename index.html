<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>성경퀴즈 예상 문제</title>
  <link rel="stylesheet" href="css/style.css?v=20260626g" />
</head>
<body>
  <header class="site-header">
    <h1>성경퀴즈 예상 문제</h1>
    <p class="subtitle">소년부</p>
    <div class="user-bar">
      <span id="user-label" class="user-label hidden"></span>
      <button id="user-change-btn" class="link-btn hidden" type="button">변경</button>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="quiz">퀴즈 풀기</button>
      <button class="tab-btn" data-tab="browse">문제집 보기</button>
      <button class="tab-btn admin-only hidden" data-tab="admin">관리자</button>
    </nav>
  </header>

  <div id="admin-modal" class="modal hidden">
    <div class="modal-card">
      <h2>관리자 인증</h2>
      <p class="muted-text">비밀번호를 입력하세요.</p>
      <input id="admin-pw-input" type="password" autocomplete="current-password" />
      <div id="admin-pw-error" class="error hidden">비밀번호가 맞지 않습니다.</div>
      <div class="modal-actions modal-actions-spread">
        <button id="admin-pw-cancel" type="button" class="secondary">취소</button>
        <button id="admin-pw-submit" type="button" class="primary">확인</button>
      </div>
    </div>
  </div>

  <div id="user-modal" class="modal hidden">
    <div class="modal-card">
      <h2>이름을 입력하세요</h2>
      <p class="muted-text">진행 기록과 오답노트는 <strong>이름 단위로 서버에 저장</strong>되어 PC/폰 어디서든 같은 기록을 사용할 수 있어요. 다른 사람이 쓰면 이름만 바꿔서 시작하세요.</p>
      <input id="user-name-input" type="text" placeholder="이름" autocomplete="off" maxlength="20" />
      <div class="modal-actions">
        <button id="user-name-submit" class="primary">시작</button>
      </div>
      <div id="user-list-label" class="muted-text user-list-label hidden">이전 사용자</div>
      <div id="user-list" class="user-list"></div>
    </div>
  </div>

  <main>
    <section id="quiz" class="tab-panel active">
      <div id="quiz-start" class="card">
        <h2>퀴즈 시작</h2>
        <p>문제 수와 유형을 선택하세요.</p>
        <div class="controls">
          <label>문제 수
            <select id="quiz-count">
              <option value="5">5문제</option>
              <option value="10" selected>10문제</option>
              <option value="20">20문제</option>
              <option value="0">전체</option>
            </select>
          </label>
          <label>유형
            <select id="quiz-type">
              <option value="all" selected>전체</option>
              <option value="mc">객관식만</option>
              <option value="sa">주관식만</option>
            </select>
          </label>
          <label>모드
            <select id="quiz-mode">
              <option value="all" selected>전체 문제</option>
              <option value="wrong">오답노트만 (0)</option>
            </select>
          </label>
          <button id="start-btn" class="primary">시작</button>
        </div>
      </div>

      <div id="quiz-play" class="card hidden">
        <div class="progress">
          <span><span id="q-index">1</span> / <span id="q-total">10</span></span>
          <span id="q-type-badge" class="type-badge"></span>
        </div>
        <div id="q-history" class="q-history"></div>
        <h2 id="q-text" class="hidden">문제</h2>
        <div id="q-sa-question" class="sa-question hidden"></div>

        <ul id="q-options" class="options hidden"></ul>

        <div id="q-sa" class="sa hidden">
          <div class="sa-actions">
            <button id="submit-btn" class="primary">제출</button>
            <button id="hint-btn" class="secondary" type="button">힌트 보기 <span id="hint-level">(0/3)</span></button>
          </div>
          <div class="hint-row">
            <span id="q-hint" class="hint"></span>
          </div>
        </div>

        <div class="quiz-footer">
          <span id="q-feedback" class="feedback"></span>
          <div class="nav-buttons">
            <button id="prev-btn" class="secondary" type="button" disabled>이전</button>
            <button id="next-btn" class="primary" disabled>다음</button>
          </div>
        </div>
      </div>

      <div id="quiz-result" class="card hidden">
        <h2>결과</h2>
        <p class="score">점수: <span id="score">0</span> / <span id="score-total">0</span></p>
        <button id="restart-btn" class="primary">다시 풀기</button>
      </div>
    </section>

    <section id="browse" class="tab-panel">
      <div class="card">
        <h2>문제집</h2>
        <div class="browse-controls">
          <input id="search" type="search" placeholder="문제 또는 정답 검색..." />
          <select id="browse-type">
            <option value="all" selected>전체</option>
            <option value="mc">객관식만</option>
            <option value="sa">주관식만</option>
          </select>
        </div>
        <ol id="question-list" class="question-list"></ol>
      </div>
    </section>

    <section id="admin" class="tab-panel">
      <div class="card">
        <h2>관리자</h2>
        <div class="admin-toolbar">
          <button id="admin-refresh-btn" class="primary" type="button">새로고침</button>
          <span id="admin-summary" class="muted-text"></span>
        </div>
        <div id="admin-users" class="admin-users"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© 2026 성경퀴즈 예상 문제</small>
  </footer>

  <script src="js/questions.js?v=20260626g"></script>
  <script type="module" src="js/app.js?v=20260626g"></script>
</body>
</html>
